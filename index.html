<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Időzítő">
    <meta name="theme-color" content="#000000">
    <title>Időzítő</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <button class="header-btn" id="cancelBtn">Mégse</button>
            </div>
            <div class="header-title">Időzítő</div>
            <div class="header-right"></div>
        </div>

        <!-- Timer Display (amikor fut) -->
        <div class="timer-running" id="timerRunning" style="display: none;">
            <div class="timer-circle">
                <svg class="progress-ring" width="280" height="280">
                    <circle class="progress-ring-bg" cx="140" cy="140" r="130" />
                    <circle class="progress-ring-circle" cx="140" cy="140" r="130" id="progressCircle" />
                </svg>
                <div class="timer-time" id="timerDisplay">00:00</div>
            </div>
        </div>

        <!-- Picker (amikor állítjuk) -->
        <div class="picker-container" id="pickerContainer">
            <div class="picker-wrapper">
                <div class="picker-highlight"></div>
                
                <div class="picker-column">
                    <div class="picker-scroll" id="hoursPicker">
                        <!-- Órák generálva JS-ből -->
                    </div>
                    <div class="picker-label">óra</div>
                </div>
                
                <div class="picker-column">
                    <div class="picker-scroll" id="minutesPicker">
                        <!-- Percek generálva JS-ből -->
                    </div>
                    <div class="picker-label">perc</div>
                </div>
                
                <div class="picker-column">
                    <div class="picker-scroll" id="secondsPicker">
                        <!-- Másodpercek generálva JS-ből -->
                    </div>
                    <div class="picker-label">mp</div>
                </div>
            </div>
        </div>

        <!-- Gyors gombok -->
        <div class="quick-buttons" id="quickButtons">
            <button class="quick-btn" data-time="60">1 MIN</button>
            <button class="quick-btn" data-time="180">3 MIN</button>
            <button class="quick-btn" data-time="300">5 MIN</button>
            <button class="quick-btn" data-time="600">10 MIN</button>
        </div>

        <!-- Control gombok -->
        <div class="controls">
            <button class="control-btn start-btn" id="startBtn">
                <div class="btn-icon">▶</div>
                <div class="btn-label">Indítás</div>
            </button>
        </div>

        <!-- Running controls -->
        <div class="running-controls" id="runningControls" style="display: none;">
            <button class="control-btn pause-btn" id="pauseBtn">
                <div class="btn-icon">⏸</div>
                <div class="btn-label">Szünet</div>
            </button>
            <button class="control-btn cancel-btn" id="cancelBtnRunning">
                <div class="btn-icon">✕</div>
                <div class="btn-label">Mégse</div>
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
