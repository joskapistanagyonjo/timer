<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fitness+">
    <meta name="theme-color" content="#000000">
    <title>Fitness+</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Home Screen -->
        <div class="home-screen" id="homeScreen">
            <div class="home-header">
                <div class="home-time" id="homeTime">12:00</div>
                <div class="home-title">Fitness+</div>
            </div>
            
            <div class="app-grid">
                <div class="app-card" data-app="timer">
                    <div class="app-icon timer-icon">
                        <i class="bi bi-stopwatch"></i>
                    </div>
                    <div class="app-name">Időzítő</div>
                </div>
                
                <div class="app-card" data-app="workout">
                    <div class="app-icon workout-icon">
                        <i class="bi bi-heart-pulse"></i>
                    </div>
                    <div class="app-name">Edzés</div>
                </div>
            </div>
        </div>

        <!-- Timer App -->
        <div class="timer-app app-view" id="timerApp" style="display: none;">
            <div class="header">
                <div class="header-left">
                    <button class="header-btn" id="timerBack">
                        <i class="bi bi-chevron-left"></i> Vissza
                    </button>
                </div>
                <div class="header-title">Időzítő</div>
                <div class="header-right">
                    <button class="voice-toggle" id="voiceToggle">
                        <i class="bi bi-mic-mute"></i>
                    </button>
                </div>
            </div>

            <div class="timer-running" id="timerRunning" style="display: none;">
                <div class="timer-circle">
                    <svg class="progress-ring" width="300" height="300">
                        <circle class="progress-ring-bg" cx="150" cy="150" r="145" />
                        <circle class="progress-ring-circle" cx="150" cy="150" r="145" id="progressCircle" />
                    </svg>
                    <div class="timer-time" id="timerDisplay">00:00</div>
                </div>
            </div>

            <div class="picker-container" id="pickerContainer">
                <div class="picker-wrapper">
                    <div class="picker-highlight"></div>
                    
                    <div class="picker-column">
                        <div class="picker-scroll" id="hoursPicker"></div>
                        <div class="picker-label">óra</div>
                    </div>
                    
                    <div class="picker-column">
                        <div class="picker-scroll" id="minutesPicker"></div>
                        <div class="picker-label">perc</div>
                    </div>
                    
                    <div class="picker-column">
                        <div class="picker-scroll" id="secondsPicker"></div>
                        <div class="picker-label">mp</div>
                    </div>
                </div>
            </div>

            <div class="quick-buttons" id="quickButtons">
                <button class="quick-btn" data-time="60">1 MIN</button>
                <button class="quick-btn" data-time="180">3 MIN</button>
                <button class="quick-btn" data-time="300">5 MIN</button>
                <button class="quick-btn" data-time="600">10 MIN</button>
            </div>

            <div class="controls">
                <button class="control-btn start-btn" id="startBtn">
                    <div class="btn-icon"><i class="bi bi-play-fill"></i></div>
                    <div class="btn-label">Indítás</div>
                </button>
            </div>

            <div class="running-controls" id="runningControls" style="display: none;">
                <button class="control-btn pause-btn" id="pauseBtn">
                    <div class="btn-icon"><i class="bi bi-pause-fill"></i></div>
                    <div class="btn-label">Szünet</div>
                </button>
                <button class="control-btn cancel-btn" id="cancelBtnRunning">
                    <div class="btn-icon"><i class="bi bi-x-lg"></i></div>
                    <div class="btn-label">Mégse</div>
                </button>
            </div>
        </div>

        <!-- Workout App -->
        <div class="workout-app app-view" id="workoutApp" style="display: none;">
            <div class="header">
                <div class="header-left">
                    <button class="header-btn" id="workoutBack">
                        <i class="bi bi-chevron-left"></i> Vissza
                    </button>
                </div>
                <div class="header-title">Edzés</div>
                <div class="header-right">
                    <button class="header-btn" id="historyBtn">
                        <i class="bi bi-clock-history"></i>
                    </button>
                </div>
            </div>

            <div class="workout-content" id="workoutContent">
                <!-- Tabs -->
                <div class="workout-tabs">
                    <button class="tab-btn active" data-tab="plans">Tervek</button>
                    <button class="tab-btn" data-tab="active">Aktív edzés</button>
                    <button class="tab-btn" data-tab="quick">Gyors rögzítés</button>
                </div>

                <!-- Plans View -->
                <div class="workout-view active" id="plansView">
                    <div class="plan-header">
                        <div class="section-title">Edzéstervek</div>
                        <div class="plan-actions">
                            <button class="icon-btn" id="addPlanBtn">
                                <i class="bi bi-plus-lg"></i>
                            </button>
                        </div>
                    </div>
                    <div class="plan-list" id="planList">
                        <div class="empty-state">
                            <i class="bi bi-journal-text"></i>
                            <p>Még nincs edzésterv</p>
                        </div>
                    </div>
                </div>

                <!-- Active Workout View -->
                <div class="workout-view" id="activeView">
                    <div class="plan-header">
                        <div class="section-title" id="activePlanName">Válassz tervet</div>
                    </div>
                    <div class="exercise-list" id="activeExerciseList">
                        <div class="empty-state">
                            <i class="bi bi-play-circle"></i>
                            <p>Indíts egy edzéstervet</p>
                        </div>
                    </div>
                </div>

                <!-- Quick Add View -->
                <div class="workout-view" id="quickView">
                    <div class="workout-form">
                        <div class="form-group">
                            <label>Gyakorlat</label>
                            <input type="text" id="exerciseName" placeholder="pl. Bench Press" class="form-input">
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Súly (kg)</label>
                                <input type="number" id="exerciseWeight" placeholder="0" class="form-input" step="0.5">
                            </div>
                            <div class="form-group">
                                <label>Ismétlés</label>
                                <input type="number" id="exerciseReps" placeholder="0" class="form-input">
                            </div>
                        </div>

                        <button class="add-set-btn" id="addSetBtn">
                            <i class="bi bi-plus-circle"></i> Sorozat hozzáadása
                        </button>
                    </div>

                    <div class="current-workout">
                        <div class="section-title">Mai edzés</div>
                        <div class="workout-sets" id="workoutSets">
                            <div class="empty-state">
                                <i class="bi bi-clipboard-check"></i>
                                <p>Még nincs rögzített sorozat</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Create/Edit Plan Modal -->
            <div class="modal" id="planModal" style="display: none;">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 id="planModalTitle">Új edzésterv</h3>
                        <button class="modal-close" id="closePlanModal">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                    <div class="modal-body">
                        <div class="form-group">
                            <label>Terv neve</label>
                            <input type="text" id="planName" placeholder="pl. Pull Day" class="form-input">
                        </div>

                        <div class="form-group">
                            <label>Gyakorlatok</label>
                            <div id="planExercises"></div>
                            <button class="add-set-btn" id="addExerciseToPlan" style="margin-top: 12px;">
                                <i class="bi bi-plus-circle"></i> Gyakorlat hozzáadása
                            </button>
                        </div>

                        <button class="add-set-btn" id="savePlanBtn">
                            <i class="bi bi-check-circle"></i> Mentés
                        </button>
                    </div>
                </div>
            </div>

            <!-- History Modal -->
            <div class="modal" id="historyModal" style="display: none;">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>Edzés napló</h3>
                        <button class="modal-close" id="closeHistory">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                    <div class="modal-body" id="historyList">
                        <div class="empty-state">
                            <i class="bi bi-calendar-x"></i>
                            <p>Még nincs edzés napló</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
