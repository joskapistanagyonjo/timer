<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Időzítő">
    <meta name="theme-color" content="#000000">
    <title>Időzítő</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="timer-display" id="timerDisplay">00:00</div>
        
        <div class="time-inputs" id="timeInputs">
            <div class="input-group">
                <input type="number" id="minutes" min="0" max="99" value="5" placeholder="0">
                <label>perc</label>
            </div>
            <div class="input-group">
                <input type="number" id="seconds" min="0" max="59" value="0" placeholder="0">
                <label>mp</label>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-start" id="startBtn">Indítás</button>
            <button class="btn btn-pause" id="pauseBtn" style="display: none;">Szünet</button>
            <button class="btn btn-reset" id="resetBtn" style="display: none;">Újra</button>
        </div>

        <div class="presets">
            <button class="preset-btn" data-time="60">1 perc</button>
            <button class="preset-btn" data-time="300">5 perc</button>
            <button class="preset-btn" data-time="600">10 perc</button>
            <button class="preset-btn" data-time="900">15 perc</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
